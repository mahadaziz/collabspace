name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 013928162507.dkr.ecr.us-east-2.amazonaws.com
  ECR_WEB_REPO: 013928162507.dkr.ecr.us-east-2.amazonaws.com/collabspace/web
  ECR_SYNC_REPO: 013928162507.dkr.ecr.us-east-2.amazonaws.com/collabspace/sync

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          DATABASE_URL: postgres://build:build@localhost:5432/build?schema=public

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch build-time public env from SSM
        id: build_env
        run: |
          set -euo pipefail
          SYNC_URL=$(aws ssm get-parameter \
            --name /collabspace/prod/next_public_sync_url \
            --query Parameter.Value --output text)
          echo "::add-mask::$SYNC_URL"
          echo "sync_url=$SYNC_URL" >> "$GITHUB_OUTPUT"

      - name: Build & push web image
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_SYNC_URL="${{ steps.build_env.outputs.sync_url }}" \
            -t "$ECR_WEB_REPO:${{ github.sha }}" \
            -t "$ECR_WEB_REPO:latest" \
            .
          docker push "$ECR_WEB_REPO:${{ github.sha }}"
          docker push "$ECR_WEB_REPO:latest"

      - name: Build & push sync image
        run: |
          docker build -f Dockerfile.sync -t "$ECR_SYNC_REPO:${{ github.sha }}" -t "$ECR_SYNC_REPO:latest" .
          docker push "$ECR_SYNC_REPO:${{ github.sha }}"
          docker push "$ECR_SYNC_REPO:latest"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render deploy script
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 deploy/docker-compose.yml)
          CADDY_B64=$(base64 -w0 deploy/Caddyfile)
          FETCH_B64=$(base64 -w0 deploy/fetch-secrets.sh)

          # Build the script the SSM agent will run on the EC2 host.
          # Variables are expanded here on the runner; the result is a fully
          # baked shell script with no remaining placeholders.
          cat > deploy.sh <<EOF
          #!/bin/bash
          set -euxo pipefail
          cd /opt/collabspace

          echo "$COMPOSE_B64" | base64 -d > docker-compose.yml
          echo "$CADDY_B64" | base64 -d > Caddyfile
          echo "$FETCH_B64" | base64 -d > fetch-secrets.sh
          chmod +x fetch-secrets.sh

          # Pull all secrets/config from SSM into .env.runtime
          bash fetch-secrets.sh

          export IMAGE_TAG="$GITHUB_SHA"
          export ECR_WEB_REPO="$ECR_WEB_REPO"
          export ECR_SYNC_REPO="$ECR_SYNC_REPO"

          aws ecr get-login-password --region "$AWS_REGION" \\
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f --filter "until=24h"
          EOF

          # Wrap the script as a single-element JSON array for SSM Parameters.commands.
          jq -Rs '{
            InstanceIds: ["${{ vars.EC2_INSTANCE_ID }}"],
            DocumentName: "AWS-RunShellScript",
            Comment: "deploy ${{ github.sha }}",
            TimeoutSeconds: 600,
            Parameters: { commands: [.] }
          }' < deploy.sh > ssm-params.json

      - name: Send SSM command
        id: ssm
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --cli-input-json file://ssm-params.json \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command id: $CMD_ID"

      - name: Wait for SSM command
        run: |
          set -euo pipefail
          CMD_ID="${{ steps.ssm.outputs.command_id }}"
          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID }}"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i] status=$STATUS"
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' --output text | tail -50
                exit 0
                ;;
              Failed|TimedOut|Cancelled)
                echo "::error::SSM command $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardErrorContent' --output text
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::SSM command timed out (10 min)"
          exit 1

      - name: Smoke test
        run: |
          set -euo pipefail
          # Caddy may take a few seconds to issue the cert on the first deploy;
          # retry a handful of times before declaring failure.
          for i in $(seq 1 12); do
            if curl -fsS --max-time 10 https://collabspace.dev/api/health; then
              echo
              echo "smoke test passed"
              exit 0
            fi
            echo "[$i] not ready yet, retrying in 10s"
            sleep 10
          done
          echo "::error::Health endpoint did not return 200"
          exit 1
